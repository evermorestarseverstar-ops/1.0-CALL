<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --es-blue: #7ccff2;
            --es-pink: #fda8d4;
            --es-yellow: #ffeb3b;
            --glass: rgba(255, 255, 255, 0.98);
        }

        html { -webkit-text-size-adjust: none; text-size-adjust: none; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #fce4ec; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            padding: 10px 10px 60px 10px; overflow-x: hidden;
        }

        /* ================= 开屏动画 ================= */
        #opening-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #fce4ec; display: flex; align-items: center; justify-content: center;
            z-index: 999;
        }
        .opening-container { 
            position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; 
        }
        .animate-ripple { position: absolute; border-radius: 50%; animation: ripple 3s infinite ease-out; }
        @keyframes ripple {
            0% { width: 100px; height: 100px; opacity: 1; border-width: 2px; }
            100% { width: 500px; height: 500px; opacity: 0; border-width: 1px; }
        }
        .opening-star { width: 160px; height: 160px; z-index: 10; animation: pulse-glow 2s infinite ease-in-out; }
        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(253,168,212,0.5)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 30px rgba(124,207,242,0.8)); }
        }
        .loading-text {
            margin-top: 20px; font-weight: bold; color: var(--es-pink);
            letter-spacing: 2px; font-size: 0.9rem; animation: text-fade 1.5s infinite; z-index: 10;
        }
        @keyframes text-fade { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* ================= 热区交互 ================= */
        .poster-container {
            position: relative; width: 100%; max-width: 800px; margin: 0 auto;
            border-radius: 15px; background: #fff; overflow: hidden;
            box-shadow: 0 15px 40px rgba(253, 168, 212, 0.3);
        }
        .poster-img { width: 100%; height: auto; display: block; pointer-events: none; }

        .hotspot { 
            position: absolute; cursor: pointer; z-index: 10; 
            background: rgba(255, 255, 255, 0.2); 
            border: 1.5px solid rgba(255, 255, 255, 0.7);
            animation: hotspot-glow 2s infinite ease-in-out; 
            transition: all 0.3s ease;
        }
        @keyframes hotspot-glow {
            0%, 100% { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.4); }
            50% { background: rgba(255, 255, 255, 0.4); border-color: rgba(255, 255, 255, 1); box-shadow: 0 0 15px rgba(255, 255, 255, 0.5); }
        }

        .spot-lineup { top: 0.8%; right: 10.5%; width: 10%; height: 4%; border-radius: 20px; }
        .spot-info { top: 0.8%; right: 2.2%; width: 7%; height: 4%; border-radius: 20px; }
        .spot-special { top: 23%; left: 12%; width: 18%; height: 9%; transform: rotate(-10deg); border-radius: 10px; }
        .spot-fanworks { top: 39.5%; left: 5%; width: 20%; height: 11%; transform: rotate(-16.3deg); border-radius: 10px; }
        .spot-mainstage { top: 12.5%; right: 13%; width: 15%; height: 12%; transform: rotate(-19deg); border-radius: 10px; }
        .spot-creative { top: 35%; right: 11%; width: 18%; height: 12%; transform: rotate(10deg); border-radius: 10px; }
        .spot-evermore { top: 49.2%; right: 0.1%; width: 28%; height: 4%; transform: rotate(-24.3deg); border-radius: 5px; }
        .spot-location { top: 60%; left: 2.0%; width: 30%; height: 4%; border-radius: 5px; }

        .social-bar { position: absolute; top: 1.2%; left: 18%; display: flex; gap: 12px; z-index: 20; }
        .social-link { color: #ffffff !important; font-size: 1.1rem; filter: drop-shadow(0 0 2px rgba(0,0,0,0.2)); transition: color 0.3s ease; }
        
        @media screen and (max-width: 768px) {
            .social-bar { top: 0.4%; left: 19%; gap: 5px; }
            .social-link { font-size: 0.65rem; }
        }

        .social-link.bili:hover, .social-link.bili:active { color: #fb7299 !important; }
        .social-link.dy:hover, .social-link.dy:active { color: #000000 !important; }
        .social-link.xhs:hover, .social-link.xhs:active { color: #ff2442 !important; }
        .social-link.qq:hover, .social-link.qq:active { color: #12b7f5 !important; }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); z-index: 100; justify-content: center; align-items: flex-start;
            padding: 5vh 0; overflow-y: auto;
        }
        .modal-card {
            background: var(--glass); width: 92%; max-width: 500px; 
            border-radius: 30px; padding: 25px; border: 2px solid white;
            position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.15); margin: auto;
        }
        .modal-header { color: var(--es-pink); font-size: 1.3rem; font-weight: 900; text-align: center; margin-bottom: 20px; }
        .clickable-row {
            background: #fff; padding: 15px 20px; border-radius: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; border: 1px solid #eee; font-weight: bold;
        }
        .sub-layer { width: 100%; display: none; flex-direction: column; }
        .sub-body { color: #555; font-size: 0.95rem; line-height: 1.8; padding-bottom: 20px; }
        .group-tip { background: #fff0f3; padding: 12px; border-radius: 12px; border-left: 4px solid var(--es-pink); margin-bottom: 15px; color: #ff4081; font-weight: bold; font-size: 0.85rem; }
        .back-btn { color: var(--es-blue); cursor: pointer; font-weight: bold; margin-bottom: 15px; display: block; }
        .close-btn { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 22px; color: #ccc; background:none; border:none; }
        .site-footer { margin-top: 30px; text-align: center; font-size: 10px; color: #b388ff; line-height: 1.6; padding: 0 10px; }
        .qq-qrcode { width: 160px; height: 160px; border-radius: 15px; margin-bottom: 15px; }

        .venue-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 10px; }
        .venue-item { width: 100%; text-align: center; }
        .venue-img { width: 100%; height: auto; border-radius: 10px; display: block; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .venue-label { font-size: 0.75rem; color: #888; margin-top: 4px; }

        /* 嘉宾详情样式优化 */
        .guest-container { width: 100%; }
        .guest-social-row { display: flex; align-items: center; justify-content: space-between; background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #eee; }
        .guest-name-label { color: var(--es-blue); font-size: 1.1rem; font-weight: bold; }
        .guest-icon-group { display: flex; gap: 15px; }
        .guest-icon-group a { font-size: 1.2rem; color: #ddd; transition: color 0.3s; }
        .guest-icon-group a:hover { color: var(--es-pink); }
        .guest-full-image { width: 100%; border-radius: 15px; display: block; margin-top: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>

            row.className = 'guest-social-row'; // 使用你 style 里写好的样式
            row.style.cursor = 'default';
            row.innerHTML = `
                <span class="guest-name-label">${item.name}</span>
                <div class="guest-icon-group">
                    <a href=" https://b23.tv/${item.bili}" target="_blank"><i class="fab fa-bilibili"></i></a>
                    <a href="https://v.douyin.com/${item.dy}" target="_blank"><i class="fab fa-tiktok"></i></a>
                    <a href="https://xhslink.com/m/${item.xhs}" target="_blank"><i class="fas fa-camera-retro"></i></a>
                </div>`;
        } 
        // --- 核心改动：如果是嘉宾图片，也直接在一级列表平铺 ---
        else if(item.isImg) {
            row.style.marginBottom = '15px';
            row.innerHTML = `<img src="${item.src}" class="guest-full-image">`;
        } 
        // --- 普通按钮（跳转 link 或 进详情页） ---
        else {
            row.className = 'clickable-row';
            row.innerHTML = `<span>${item.label}</span><i class="fas fa-chevron-right" style="color:#eee"></i>`;
            row.onclick = function() {
                if(item.detail && item.detail.startsWith("link:")) {
                    openMenu(item.detail.split(":")[1]);
                } else {
                    showDetail(data.title, item);
                }
            };
        }
        listEl.appendChild(row);
    });
    
    document.getElementById('overlay').style.display = 'flex';
}

        function showDetail(parentTitle, item) {
            document.getElementById('mainView').style.display = 'none';
            document.getElementById('subTitle').innerText = item.label;
            document.getElementById('subTip').style.display = (parentTitle.includes("舞台") || parentTitle.includes("摊位")) ? 'block' : 'none';
            
            let content = '';
            if(item.isGuest) {
                content = `
                    <div class="guest-social-row">
                        <span class="guest-name-label">${item.name}</span>
                        <div class="guest-icon-group">
                            <a href="https://space.bilibili.com/${item.bili}" target="_blank"><i class="fab fa-bilibili"></i></a>
                            <a href="https://v.douyin.com/${item.dy}" target="_blank"><i class="fab fa-tiktok"></i></a>
                            <a href="https://xhslink.com/m/${item.xhs}" target="_blank"><i class="fas fa-camera-retro"></i></a>
                        </div>
                    </div>`;
            } else if(item.isImg) {
                content = `<img src="${item.src}" class="guest-full-image">`;
            } else {
                content = item.detail;
            }
            
            document.getElementById('subBody').innerHTML = content;
            document.getElementById('subLayer').style.display = 'flex';
        }

        function closeSub() { document.getElementById('subLayer').style.display = 'none'; document.getElementById('mainView').style.display = 'block'; }
        function closeAll() { document.getElementById('overlay').style.display = 'none'; }
        function openQQPopup() {
            document.getElementById('mainView').style.display = 'none';
            document.getElementById('subLayer').style.display = 'none';
            document.getElementById('qqView').style.display = 'block';
            document.getElementById('overlay').style.display = 'flex';
        }
    </script>
</body>
</html>
